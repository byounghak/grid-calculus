name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} (Ubuntu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential clang

      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.compiler }}-debug/_deps
          key: deps-${{ matrix.compiler }}-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: |
            deps-${{ matrix.compiler }}-

      - name: Configure
        run: cmake --preset ${{ matrix.compiler }}-debug -DGRIDCALC_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.compiler }}-debug

      - name: Test
        run: ctest --preset ${{ matrix.compiler }}-debug

  render-docs:
    name: Render Doc PDFs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pandoc + texlive (xelatex)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            lmodern

      - name: Render User Guide and Developer Note
        run: ./scripts/render-docs.sh

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: gridcalc-docs-pdfs
          path: build/docs/*.pdf
          if-no-files-found: error
