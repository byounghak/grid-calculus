name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} (Ubuntu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential clang

      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.compiler }}-debug/_deps
          key: deps-${{ matrix.compiler }}-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: |
            deps-${{ matrix.compiler }}-

      - name: Configure
        run: cmake --preset ${{ matrix.compiler }}-debug -DGRIDCALC_WARNINGS_AS_ERRORS=ON -DGRIDCALC_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.compiler }}-debug

      - name: Test
        run: ctest --preset ${{ matrix.compiler }}-debug

  docs-build:
    name: Build doc PDFs (Doxygen + LaTeX)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Doxygen, Graphviz, TeX Live
        run: |
          sudo apt-get update
          # texlive-full guarantees all transitive dependencies of the
          # Doxygen-generated doxygen.sty (notably stackengine + listofitems
          # + tabu + adjustbox) are present without our having to map each
          # .sty file to its containing apt package. The download is large
          # (~2 GB) but only a one-time cost per CI run, and it sidesteps
          # the per-Ubuntu-version drift in the texlive-* package layout.
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            doxygen graphviz \
            latexmk \
            texlive-full

      - name: Configure (docs only)
        run: |
          cmake -B build/docs \
                -DGRIDCALC_BUILD_DOCS=ON \
                -DGRIDCALC_BUILD_TESTS=OFF \
                -G Ninja

      - name: Build all docs targets
        run: cmake --build build/docs --target gridcalc-docs-all

      - name: Stage artifact bundle
        run: |
          mkdir -p build/docs-artifacts
          cp build/docs/docs/user-guide/main.pdf      build/docs-artifacts/user-guide.pdf
          cp build/docs/docs/developer-note/main.pdf  build/docs-artifacts/developer-note.pdf
          tar -C build/docs/docs -czf build/docs-artifacts/doxygen.tar.gz doxygen

      - name: Upload PDFs + Doxygen
        uses: actions/upload-artifact@v4
        with:
          name: gridcalc-docs-pdfs
          path: build/docs-artifacts/
          if-no-files-found: error

  docs-lint:
    name: Documentation lint (Doxygen warnings + \since tags)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Doxygen + Python + latexmk
        run: |
          sudo apt-get update
          # latexmk is installed only because docs/CMakeLists.txt's
          # find_program(LATEXMK_EXECUTABLE REQUIRED) probes for it during
          # configure even when only the Doxygen target will run. The
          # docs-build job (above) is the one that actually invokes it.
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build doxygen graphviz python3 latexmk

      - name: Configure (docs only, just enough to drive Doxygen)
        run: |
          cmake -B build/lint \
                -DGRIDCALC_BUILD_DOCS=ON \
                -DGRIDCALC_BUILD_TESTS=OFF \
                -G Ninja

      - name: Run Doxygen
        run: cmake --build build/lint --target gridcalc-docs-doxygen

      - name: Fail on undocumented public symbols
        run: |
          # Allow benign math-mode warnings (e.g., `\partial`, `\nabla` inside
          # `$...$` blocks); fail on any other warning. The list of allowed
          # patterns is intentionally narrow.
          if grep -v "Found unknown command" build/lint/docs/doxygen-warnings.log | grep -q .; then
            echo "Doxygen produced non-math warnings:"
            grep -v "Found unknown command" build/lint/docs/doxygen-warnings.log
            exit 1
          fi
          echo "Doxygen lint clean (math warnings only)."

      - name: Run \since tag check
        run: python3 scripts/check-since.py include/gridcalc/
